# TCST high-speed IBVS-SO3: target head-on / incoming test.

rates:
  physics_hz: 1000.0
  control_hz: 200.0
  camera_hz: 30.0
  visualization_hz: 24.0

visualization:
  enable: true
  realtime: false
  enable_fov: true
  trail_len: 1000
  auto_axis: false
  ned_axes: true
  uav_visual_scale: 3.0
  target_marker_size: 12.0
  fov_target_marker_size: 7.0
  fov_target_marker_size_min: 6.0
  fov_target_marker_size_max: 42.0
  fov_target_diameter_m: 1.5
  map_center: [35.0, 10.0, -5.0]
  map_size: [120.0, 90.0, 60.0]
  colors:
    uav_traj: [158, 22, 157, 140]
    uav_body_left: [22, 5, 139]
    uav_body_right: [98, 0, 170]
    uav_arrow: [204, 74, 116]
    target_traj: [252, 180, 49]
    target_dot: [235, 120, 82]
    fov_target: [181, 35, 4]
    fov_status_no_target: [181, 35, 4]
    fov_status_has_target: [0, 128, 0]
  enable_realtime_animation: false
  enable_offline_animation: true
  save_cache: false

termination:
  t_final: 20.0
  hit_radius: 2.0

uav0:
  t: 0.0
  p_e: [0.0, 0.0, 0.0]
  v_e: [0.0, 0.0, 0.0]
  q_eb: [1.0, 0.0, 0.0, 0.0]
  w_b: [0.0, 0.0, 0.0]

tgt0:
  t: 0.0
  p_e: [70.0, 0.0, 0.0]
  v_e: [-6.0, 6.0, 0.0]

target:
  mode: constant_velocity
  accel_e: null

rigid_body:
  params_yaml: "configs/hummingbird.yaml"

camera:
  fx: 320.0
  fy: 320.0
  cx: 320.0
  cy: 240.0
  width: 640
  height: 480
  mount_pitch_deg: 0.0

controller:
  mass: 0.5
  g: 9.81
  k1: 0.8
  k2: 1.4
  k_los: 1.5
  kb: 0.16
  k_att: 2.8
  accel_max: 8.0
  omega_max: 6.0
  thrust_min: 0.0
  thrust_max: 40.0
  camera_mount_pitch_deg: 0.0

logging:
  enable: false
  run_dir: "runs"
  filename: null
  seed: 0
